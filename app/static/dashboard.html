<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>KRkRice AI Helpdesk</title>
  <style>
    :root { --ink:#162019; --muted:#6b756e; --rice:#f5f0df; --cream:#fffdf6; --green:#22543d; --lime:#b7d36b; --line:#dfe4da; --red:#a63d40; --amber:#a66a16; }
    * { box-sizing:border-box; }
    body { margin:0; color:var(--ink); background:linear-gradient(135deg,#f5f0df 0%,#edf3e6 100%); font:15px/1.5 Inter,ui-sans-serif,system-ui,-apple-system,sans-serif; min-height:100vh; }
    header,main { max-width:1180px; margin:auto; padding:0 28px; }
    header { padding-top:42px; padding-bottom:24px; display:flex; align-items:flex-end; justify-content:space-between; gap:24px; }
    .eyebrow { color:var(--green); font-weight:800; letter-spacing:.14em; text-transform:uppercase; font-size:12px; }
    h1 { margin:5px 0 4px; font:700 38px/1.1 Georgia,serif; }
    .subtitle { color:var(--muted); margin:0; }
    .status { display:flex; align-items:center; gap:9px; background:var(--cream); border:1px solid var(--line); border-radius:999px; padding:9px 14px; box-shadow:0 8px 24px #344a3820; }
    .dot { width:9px; height:9px; background:#39a066; border-radius:50%; box-shadow:0 0 0 4px #39a06620; }
    .metrics { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; }
    .card,.panel { background:#fffef9d9; border:1px solid var(--line); box-shadow:0 14px 40px #344a3812; }
    .card { padding:19px; border-radius:16px; }
    .metric-label { color:var(--muted); font-size:13px; }
    .metric-value { font:700 32px/1.2 Georgia,serif; margin-top:5px; }
    .layout { display:grid; grid-template-columns:1fr 2fr; gap:18px; margin:18px 0 48px; }
    .panel { border-radius:18px; padding:22px; }
    h2 { font:700 21px/1.2 Georgia,serif; margin:0 0 18px; }
    .bar-row { margin:14px 0; }
    .bar-title { display:flex; justify-content:space-between; font-size:13px; margin-bottom:6px; }
    .bar { height:8px; background:#e9ede5; border-radius:9px; overflow:hidden; }
    .bar span { display:block; height:100%; background:linear-gradient(90deg,var(--green),var(--lime)); border-radius:9px; }
    table { width:100%; border-collapse:collapse; }
    th { color:var(--muted); font-size:11px; letter-spacing:.08em; text-transform:uppercase; text-align:left; padding:0 10px 11px; }
    td { padding:13px 10px; border-top:1px solid var(--line); vertical-align:middle; }
    a { color:var(--green); font-weight:750; text-decoration:none; }
    .badge { display:inline-block; border-radius:999px; padding:4px 9px; font-size:12px; font-weight:750; background:#e8efe6; color:var(--green); }
    .badge.escalate { color:var(--red); background:#f8e7e7; }
    .badge.route { color:var(--amber); background:#f7eedf; }
    .empty,.error { color:var(--muted); padding:30px 10px; text-align:center; }
    @media(max-width:850px){ .metrics{grid-template-columns:repeat(2,1fr)} .layout{grid-template-columns:1fr} header{align-items:flex-start;flex-direction:column} }
    @media(max-width:520px){ .metrics{grid-template-columns:1fr 1fr} header,main{padding-left:16px;padding-right:16px} .table-wrap{overflow:auto} }
  </style>
</head>
<body>
  <header>
    <div><div class="eyebrow">KRkRice · IT Operations</div><h1>AI Helpdesk Control Room</h1><p class="subtitle">Autonomous triage decisions and human-readable audit trail.</p></div>
    <div class="status"><span class="dot"></span><span>Audit service online</span></div>
  </header>
  <main>
    <section class="metrics">
      <div class="card"><div class="metric-label">Total processed</div><div class="metric-value" id="total">—</div></div>
      <div class="card"><div class="metric-label">Answered</div><div class="metric-value" id="respond">—</div></div>
      <div class="card"><div class="metric-label">Routed</div><div class="metric-value" id="route">—</div></div>
      <div class="card"><div class="metric-label">Escalated</div><div class="metric-value" id="escalate">—</div></div>
    </section>
    <section class="layout">
      <div class="panel"><h2>Work by category</h2><div id="categories"></div></div>
      <div class="panel"><h2>Decision history</h2><div class="table-wrap"><table><thead><tr><th>Ticket</th><th>Decision</th><th>Category</th><th>Team</th><th>Time</th></tr></thead><tbody id="events"></tbody></table></div></div>
    </section>
  </main>
  <script>
    const jiraBase = 'https://krkrice.atlassian.net/browse/';
    const decisionOf = e => {
      const label = (e.labels || []).find(value => value.startsWith('decision-'));
      if(label) return label.replace('decision-', '');
      return e.action === 'add_public_comment' || e.action === 'add_internal_comment' ? 'respond' : e.action === 'escalate' ? 'escalate' : 'route';
    };
    const escapeHtml = value => String(value).replace(/[&<>'"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
    async function load(){
      try {
        const response = await fetch('/api/audit?limit=200');
        if(!response.ok) throw new Error('Audit API unavailable');
        const events = await response.json();
        const counts = {respond:0,route:0,escalate:0};
        const categories = {};
        events.forEach(e => { counts[decisionOf(e)]++; categories[e.category]=(categories[e.category]||0)+1; });
        document.querySelector('#total').textContent=events.length;
        Object.keys(counts).forEach(k => document.querySelector('#'+k).textContent=counts[k]);
        const max=Math.max(1,...Object.values(categories));
        document.querySelector('#categories').innerHTML=Object.entries(categories).sort((a,b)=>b[1]-a[1]).map(([name,n])=>`<div class="bar-row"><div class="bar-title"><span>${escapeHtml(name)}</span><strong>${n}</strong></div><div class="bar"><span style="width:${n/max*100}%"></span></div></div>`).join('') || '<div class="empty">No audit events yet.</div>';
        document.querySelector('#events').innerHTML=events.map(e=>{const d=decisionOf(e); return `<tr><td><a href="${jiraBase}${encodeURIComponent(e.issue_key)}" target="_blank">${escapeHtml(e.issue_key)}</a></td><td><span class="badge ${d}">${d}</span></td><td>${escapeHtml(e.category)}</td><td>${escapeHtml(e.assigned_team_name)}</td><td>${new Date(e.created_at).toLocaleString()}</td></tr>`}).join('') || '<tr><td colspan="5" class="empty">No audit events yet.</td></tr>';
      } catch(error) { document.querySelector('#events').innerHTML=`<tr><td colspan="5" class="error">${escapeHtml(error.message)}</td></tr>`; }
    }
    load(); setInterval(load,30000);
  </script>
</body>
</html>
